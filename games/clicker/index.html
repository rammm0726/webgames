<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>疯狂点击</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f0f1a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            color: #e0e0e0;
            overflow: hidden;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .title {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #f43f5e, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats {
            display: flex;
            gap: 2rem;
        }
        .stat-box {
            background: rgba(244, 63, 94, 0.3);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            text-align: center;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #888;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .click-area {
            width: 300px;
            height: 300px;
            background: #1a1a2e;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
            position: relative;
            overflow: hidden;
        }
        .click-target {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f43f5e, #f59e0b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            transition: all 0.1s ease;
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        .click-area.clicked {
            transform: scale(0.98);
        }
        .btn {
            background: linear-gradient(135deg, #f43f5e, #f59e0b);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .instructions {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
        }
        .game-over {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }
        .game-over h2 { color: #f43f5e; font-size: 2rem; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title">疯狂点击 👆</div>
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">分数</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">时间</div>
                <div class="stat-value" id="time">30</div>
            </div>
        </div>
        <div class="click-area" id="clickArea" onclick="handleClick()">
            <div class="click-target" id="target">👆</div>
        </div>
        <button class="btn" id="startBtn" onclick="startGame()">开始游戏</button>
        <div class="instructions">快速点击目标，在限时内获得高分！</div>
    </div>

    <div class="game-over hidden" id="gameOver">
        <h2>时间到！</h2>
        <p>最终分数: <span id="finalScore">0</span></p>
        <button class="btn" onclick="document.getElementById('gameOver').classList.add('hidden'); startGame()">再来一局</button>
    </div>

    <script>
        let score = 0;
        let time = 30;
        let gameRunning = false;
        let timerInterval;

        function handleClick() {
            if (!gameRunning) return;
            
            score++;
            document.getElementById('score').textContent = score;
            
            const area = document.getElementById('clickArea');
            const target = document.getElementById('target');
            
            area.classList.add('clicked');
            setTimeout(() => area.classList.remove('clicked'), 100);
            
            const x = Math.random() * 200 - 100;
            const y = Math.random() * 200 - 100;
            target.style.transform = `translate(${x}px, ${y}px)`;
        }

        function startGame() {
            score = 0;
            time = 30;
            gameRunning = true;
            
            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = time;
            document.getElementById('startBtn').disabled = true;
            
            document.getElementById('target').style.transform = 'translate(0, 0)';
            
            timerInterval = setInterval(() => {
                time--;
                document.getElementById('time').textContent = time;
                
                if (time <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.remove('hidden');
        }
    </script>
</body>
</html>
