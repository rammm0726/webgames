<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>打飞机</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #667eea, #764ba2);
  min-height: 100vh;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
}
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 500px;
  padding: 12px 16px;
  gap: 10px;
}
.back-btn {
  color: white;
  text-decoration: none;
  background: rgba(255,255,255,0.2);
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 14px;
  white-space: nowrap;
}
.back-btn:hover { background: rgba(255,255,255,0.3); }
.title { font-size: 20px; font-weight: bold; }
.info { display: flex; gap: 14px; font-size: 14px; white-space: nowrap; }
.controls {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
.controls button {
  background: rgba(255,255,255,0.2);
  color: white;
  border: none;
  padding: 8px 18px;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
}
.controls button:hover { background: rgba(255,255,255,0.35); }
.canvas-wrap {
  position: relative;
  width: 100%;
  max-width: 400px;
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}
canvas {
  display: block;
  width: 100%;
  max-width: 400px;
  border-radius: 10px;
  touch-action: none;
}
.overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.75);
  border-radius: 10px;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  color: white;
  text-align: center;
}
.overlay.show { display: flex; }
.overlay h2 { font-size: 28px; }
.overlay p { font-size: 16px; }
.overlay button {
  background: #667eea;
  color: white;
  border: none;
  padding: 10px 28px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}
.overlay button:hover { background: #5a6fd6; }
</style>
</head>
<body>
<div class="top-bar">
  <a class="back-btn" href="../../index.html">← 返回</a>
  <span class="title">打飞机</span>
  <div class="info">
    <span>分数: <b id="score">0</b></span>
    <span id="livesDisplay">❤️❤️❤️</span>
    <span>Lv<b id="weaponLv">1</b></span>
  </div>
</div>
<div class="controls">
  <button onclick="startGame()">▶️ 开始</button>
  <button onclick="pauseGame()">⏸️ 暂停</button>
  <button onclick="stopGame()">⏹️ 停止</button>
</div>
<div class="canvas-wrap">
  <canvas id="c" width="400" height="600"></canvas>
  <div class="overlay" id="overlay">
    <h2>游戏结束</h2>
    <p>得分: <b id="finalScore">0</b></p>
    <p>最高分: <b id="bestScore">0</b></p>
    <button onclick="startGame()">重新开始</button>
  </div>
</div>

<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var scoreEl = document.getElementById('score');
var livesEl = document.getElementById('livesDisplay');
var overlayEl = document.getElementById('overlay');
var finalScoreEl = document.getElementById('finalScore');
var bestScoreEl = document.getElementById('bestScore');
var weaponLvEl = document.getElementById('weaponLv');

var W = 400, H = 600;
var running = false, paused = false, gameOver = false;
var score = 0, lives = 3;
var best = parseInt(localStorage.getItem('best_shooter')) || 0;
var lastFire = 0, lastSpawn = 0;
var bullets = [], enemies = [], explosions = [], powerups = [];
var weaponLv = 1, shieldTimer = 0, speedTimer = 0, doubleTimer = 0;
var animId = null;
var lastTs = 0;

// Web Audio API sound
var audioCtx = null;
function playSound(type) {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return; } }
  var osc = audioCtx.createOscillator();
  var gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  gain.gain.value = 0.15;
  if (type === 'powerup') {
    osc.type = 'square'; osc.frequency.value = 1200;
    osc.start(); osc.stop(audioCtx.currentTime + 0.08);
  } else if (type === 'bomb') {
    osc.type = 'sawtooth'; osc.frequency.value = 200;
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  } else if (type === 'hit') {
    osc.type = 'square'; osc.frequency.value = 300;
    osc.start(); osc.stop(audioCtx.currentTime + 0.05);
  }
}

var player = { x: W / 2, y: H - 50, w: 36, h: 40, speed: 5 };
var keys = {};
var touchX = null;

function reset() {
  score = 0; lives = 3; gameOver = false; paused = false;
  bullets = []; enemies = []; explosions = []; powerups = [];
  weaponLv = 1; shieldTimer = 0; speedTimer = 0; doubleTimer = 0; lastTs = 0;
  player.x = W / 2;
  lastFire = 0; lastSpawn = 0;
  updateUI();
  weaponLvEl.textContent = '1';
  overlayEl.classList.remove('show');
}

function updateUI() {
  scoreEl.textContent = score;
  livesEl.textContent = '❤️'.repeat(Math.max(0, lives));
}

function startGame() {
  if (running && !gameOver) { paused = false; return; }
  reset();
  running = true;
  if (animId) cancelAnimationFrame(animId);
  loop();
}

function pauseGame() {
  if (!running || gameOver) return;
  paused = !paused;
  if (!paused) loop();
}

function stopGame() {
  running = false; paused = false;
  if (animId) cancelAnimationFrame(animId);
  reset();
  drawIdle();
}

function endGame() {
  running = false; gameOver = true;
  if (score > best) { best = score; localStorage.setItem('best_shooter', best); }
  finalScoreEl.textContent = score;
  bestScoreEl.textContent = best;
  overlayEl.classList.add('show');
}

function loseLife() {
  lives--;
  weaponLv = 1; shieldTimer = 0; speedTimer = 0; doubleTimer = 0;
  weaponLvEl.textContent = '1';
  updateUI();
  if (lives <= 0) endGame();
}

// Spawn
function spawnInterval() { return Math.max(400, 1200 - score * 3); }

function spawnEnemy(now) {
  if (now - lastSpawn < spawnInterval()) return;
  lastSpawn = now;
  var r = Math.random();
  var type = r < 0.6 ? 0 : r < 0.85 ? 1 : 2; // 0=small,1=med,2=large
  var cfg = [
    { w: 24, h: 24, hp: 1, speed: 3 + score * 0.005, pts: 10, color: '#ff4444' },
    { w: 36, h: 36, hp: 3, speed: 2 + score * 0.004, pts: 30, color: '#ff8800' },
    { w: 50, h: 50, hp: 6, speed: 1.2 + score * 0.003, pts: 50, color: '#9944ff' }
  ][type];
  enemies.push({
    x: Math.random() * (W - cfg.w) + cfg.w / 2,
    y: -cfg.h,
    w: cfg.w, h: cfg.h, hp: cfg.hp, maxHp: cfg.hp,
    speed: Math.min(cfg.speed, 8), pts: cfg.pts, color: cfg.color,
    vx: (Math.random() - 0.5) * 3
  });
}

// Fire
function fire(now) {
  if (now - lastFire < 200) return;
  lastFire = now;
  var by = player.y - player.h / 2;
  if (weaponLv === 1) {
    bullets.push({ x: player.x, y: by, w: 4, h: 12, speed: 8, vx: 0 });
  } else if (weaponLv === 2) {
    bullets.push({ x: player.x - 8, y: by, w: 4, h: 12, speed: 8, vx: 0 });
    bullets.push({ x: player.x + 8, y: by, w: 4, h: 12, speed: 8, vx: 0 });
  } else if (weaponLv === 3) {
    bullets.push({ x: player.x - 12, y: by, w: 4, h: 12, speed: 8, vx: 0 });
    bullets.push({ x: player.x, y: by, w: 4, h: 12, speed: 8, vx: 0 });
    bullets.push({ x: player.x + 12, y: by, w: 4, h: 12, speed: 8, vx: 0 });
  } else if (weaponLv >= 4) {
    bullets.push({ x: player.x - 12, y: by, w: 4, h: 12, speed: 8, vx: 0 });
    bullets.push({ x: player.x, y: by, w: 4, h: 12, speed: 8, vx: 0 });
    bullets.push({ x: player.x + 12, y: by, w: 4, h: 12, speed: 8, vx: 0 });
    var angle = 15 * Math.PI / 180;
    var svx = Math.sin(angle) * 8, svy = -Math.cos(angle) * 8;
    bullets.push({ x: player.x - 10, y: by, w: 4, h: 12, speed: 8, vx: -svx, vy: svy });
    bullets.push({ x: player.x + 10, y: by, w: 4, h: 12, speed: 8, vx: svx, vy: svy });
  }
}

// Powerup system
var powerupTypes = [
  { type: 'weapon', label: '\u26A1', color: '#FFD700', chance: 0.15 },
  { type: 'shield', label: '\uD83D\uDEE1', color: '#00FFFF', chance: 0.10 },
  { type: 'bomb',   label: '\uD83D\uDCA3', color: '#FF4444', chance: 0.08 },
  { type: 'speed',  label: '\uD83D\uDC5F', color: '#00CC00', chance: 0.12 },
  { type: 'double', label: '\u2716\uFE0F2', color: '#DAA520', chance: 0.10 }
];

function spawnPowerup(x, y) {
  var r = Math.random();
  var cumul = 0;
  for (var i = 0; i < powerupTypes.length; i++) {
    cumul += powerupTypes[i].chance;
    if (r < cumul) {
      powerups.push({ x: x, y: y, w: 20, h: 20, type: powerupTypes[i].type, label: powerupTypes[i].label, color: powerupTypes[i].color, speed: 1.5 });
      return;
    }
  }
}

function tryDropPowerup(e) {
  // e.type is 0=small,1=med,2=large; determine base drop rate
  var w = e.w;
  var baseRate;
  if (w <= 24) baseRate = 0.15;
  else if (w <= 36) baseRate = 0.25;
  else baseRate = 0.40;
  if (Math.random() < baseRate) {
    spawnPowerup(e.x, e.y);
  }
}

function updatePowerups() {
  for (var i = powerups.length - 1; i >= 0; i--) {
    var p = powerups[i];
    p.y += p.speed;
    if (p.y - p.h / 2 > H) { powerups.splice(i, 1); continue; }
    // Check player collision
    if (Math.abs(p.x - player.x) < (p.w + player.w) / 2 &&
        Math.abs(p.y - player.y) < (p.h + player.h) / 2) {
      applyPowerup(p.type);
      playSound('powerup');
      powerups.splice(i, 1);
    }
  }
}

function applyPowerup(type) {
  if (type === 'weapon') {
    if (weaponLv < 4) weaponLv++;
    weaponLvEl.textContent = weaponLv;
  } else if (type === 'shield') {
    shieldTimer = 5;
  } else if (type === 'bomb') {
    playSound('bomb');
    for (var i = 0; i < enemies.length; i++) {
      var pts = enemies[i].pts;
      if (doubleTimer > 0) pts *= 2;
      score += pts;
      addExplosion(enemies[i].x, enemies[i].y, enemies[i].color);
    }
    enemies = [];
    updateUI();
  } else if (type === 'speed') {
    speedTimer = 8;
  } else if (type === 'double') {
    doubleTimer = 10;
  }
}

// Update
function update(now) {
  // Delta time for timers
  if (lastTs === 0) lastTs = now;
  var dt = (now - lastTs) / 1000;
  lastTs = now;
  if (dt > 0.1) dt = 0.1; // cap

  // Decrement timers
  if (shieldTimer > 0) shieldTimer = Math.max(0, shieldTimer - dt);
  if (speedTimer > 0) speedTimer = Math.max(0, speedTimer - dt);
  if (doubleTimer > 0) doubleTimer = Math.max(0, doubleTimer - dt);

  // Player movement (apply speed boost)
  var spd = player.speed * (speedTimer > 0 ? 1.8 : 1);
  if (keys['ArrowLeft'] || keys['a']) player.x -= spd;
  if (keys['ArrowRight'] || keys['d']) player.x += spd;
  if (touchX !== null) {
    var dx = touchX - player.x;
    if (Math.abs(dx) > 2) player.x += Math.sign(dx) * Math.min(Math.abs(dx), spd * 1.5);
  }
  player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));

  fire(now);
  spawnEnemy(now);

  // Bullets
  for (var i = bullets.length - 1; i >= 0; i--) {
    var b = bullets[i];
    b.y -= b.speed;
    if (b.vx) b.x += b.vx;
    if (b.vy) b.y += b.vy + b.speed; // vy is negative for upward, override the default
    if (b.y < -10 || b.x < -10 || b.x > W + 10) bullets.splice(i, 1);
  }

  // Enemies
  for (var i = enemies.length - 1; i >= 0; i--) {
    var e = enemies[i];
    e.y += e.speed;
    e.x += e.vx;
    // Bounce off side walls
    if (e.x - e.w / 2 < 0) { e.x = e.w / 2; e.vx = Math.abs(e.vx); }
    if (e.x + e.w / 2 > W) { e.x = W - e.w / 2; e.vx = -Math.abs(e.vx); }
    // Reached bottom - just remove, no life lost
    if (e.y - e.h / 2 > H) { enemies.splice(i, 1); continue; }
    // Hit player
    if (Math.abs(e.x - player.x) < (e.w + player.w) / 2.5 &&
        Math.abs(e.y - player.y) < (e.h + player.h) / 2.5) {
      if (shieldTimer > 0) {
        // Shield active: destroy enemy, gain points, no life lost
        var pts = e.pts;
        if (doubleTimer > 0) pts *= 2;
        score += pts;
        updateUI();
        addExplosion(e.x, e.y, e.color);
        playSound('hit');
        enemies.splice(i, 1);
      } else {
        enemies.splice(i, 1); addExplosion(e.x, e.y, e.color); loseLife();
      }
      continue;
    }
    // Bullet collision
    for (var j = bullets.length - 1; j >= 0; j--) {
      var b = bullets[j];
      if (Math.abs(b.x - e.x) < (b.w + e.w) / 2 && Math.abs(b.y - e.y) < (b.h + e.h) / 2) {
        bullets.splice(j, 1);
        e.hp--;
        if (e.hp <= 0) {
          var pts = e.pts;
          if (doubleTimer > 0) pts *= 2;
          score += pts;
          updateUI();
          addExplosion(e.x, e.y, e.color);
          tryDropPowerup(e);
          enemies.splice(i, 1);
        }
        break;
      }
    }
  }

  // Powerups
  updatePowerups();

  // Explosions
  for (var i = explosions.length - 1; i >= 0; i--) {
    explosions[i].r += 2;
    explosions[i].alpha -= 0.05;
    if (explosions[i].alpha <= 0) explosions.splice(i, 1);
  }
}

function addExplosion(x, y, color) {
  explosions.push({ x: x, y: y, r: 5, alpha: 1, color: color });
}

// Draw
function draw() {
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  // Stars (static decorative)
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  for (var i = 0; i < 30; i++) {
    var sx = (i * 137 + 50) % W;
    var sy = (i * 211 + 30) % H;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  // Bullets
  ctx.fillStyle = '#ffff00';
  for (var i = 0; i < bullets.length; i++) {
    var b = bullets[i];
    ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
  }

  // Enemies (plane shapes)
  for (var i = 0; i < enemies.length; i++) {
    var e = enemies[i];
    ctx.save();
    ctx.translate(e.x, e.y);
    var hw = e.w / 2, hh = e.h / 2;

    // Darker shade for details
    var dark = e.color;
    ctx.fillStyle = e.color;

    // Body (fuselage) - elongated, pointing down
    ctx.beginPath();
    ctx.moveTo(0, hh);                    // nose (bottom)
    ctx.lineTo(-hw * 0.25, hh * 0.3);
    ctx.lineTo(-hw * 0.2, -hh * 0.6);
    ctx.lineTo(0, -hh);                   // tail top
    ctx.lineTo(hw * 0.2, -hh * 0.6);
    ctx.lineTo(hw * 0.25, hh * 0.3);
    ctx.closePath();
    ctx.fill();

    // Wings
    ctx.beginPath();
    ctx.moveTo(-hw * 0.2, hh * 0.1);
    ctx.lineTo(-hw, hh * 0.45);           // left wing tip
    ctx.lineTo(-hw * 0.85, hh * 0.15);
    ctx.lineTo(-hw * 0.2, -hh * 0.1);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(hw * 0.2, hh * 0.1);
    ctx.lineTo(hw, hh * 0.45);            // right wing tip
    ctx.lineTo(hw * 0.85, hh * 0.15);
    ctx.lineTo(hw * 0.2, -hh * 0.1);
    ctx.closePath();
    ctx.fill();

    // Tail fins
    ctx.beginPath();
    ctx.moveTo(-hw * 0.15, -hh * 0.5);
    ctx.lineTo(-hw * 0.5, -hh * 0.75);
    ctx.lineTo(-hw * 0.15, -hh * 0.85);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(hw * 0.15, -hh * 0.5);
    ctx.lineTo(hw * 0.5, -hh * 0.75);
    ctx.lineTo(hw * 0.15, -hh * 0.85);
    ctx.closePath();
    ctx.fill();

    // Cockpit (darker circle on nose area)
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.arc(0, hh * 0.2, hw * 0.2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // HP bar for medium/large
    if (e.maxHp > 1) {
      ctx.fillStyle = '#333';
      ctx.fillRect(e.x - hw, e.y - hh - 6, e.w, 4);
      ctx.fillStyle = '#0f0';
      ctx.fillRect(e.x - hw, e.y - hh - 6, e.w * (e.hp / e.maxHp), 4);
    }
  }

  // Powerups
  ctx.font = '14px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (var i = 0; i < powerups.length; i++) {
    var p = powerups[i];
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.85;
    ctx.fillRect(p.x - p.w / 2, p.y - p.h / 2, p.w, p.h);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.fillText(p.label, p.x, p.y);
  }

  // Player plane
  ctx.save();
  ctx.translate(player.x, player.y);
  // Body
  ctx.fillStyle = '#00ccff';
  ctx.beginPath();
  ctx.moveTo(0, -player.h / 2);
  ctx.lineTo(-player.w / 2, player.h / 2);
  ctx.lineTo(-player.w / 4, player.h / 3);
  ctx.lineTo(player.w / 4, player.h / 3);
  ctx.lineTo(player.w / 2, player.h / 2);
  ctx.closePath();
  ctx.fill();
  // Cockpit
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(0, -2, 5, 0, Math.PI * 2);
  ctx.fill();
  // Wings
  ctx.fillStyle = '#0088cc';
  ctx.fillRect(-player.w / 2 - 4, player.h / 6, 8, 10);
  ctx.fillRect(player.w / 2 - 4, player.h / 6, 8, 10);
  ctx.restore();

  // Shield effect
  if (shieldTimer > 0) {
    var pulse = 0.4 + 0.3 * Math.sin(Date.now() * 0.008);
    ctx.strokeStyle = 'rgba(0, 255, 255, ' + pulse + ')';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.w * 0.9, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(0, 255, 255, ' + (pulse * 0.5) + ')';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.w * 0.95, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Explosions
  for (var i = 0; i < explosions.length; i++) {
    var ex = explosions[i];
    ctx.globalAlpha = ex.alpha;
    ctx.fillStyle = ex.color;
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffff88';
    ctx.beginPath();
    ctx.arc(ex.x, ex.y, ex.r * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Active powerup HUD
  ctx.font = '13px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  var hudY = 8;
  if (shieldTimer > 0) {
    ctx.fillStyle = '#00FFFF';
    ctx.fillText('\uD83D\uDEE1 \u62A4\u76FE ' + Math.ceil(shieldTimer) + 's', 8, hudY);
    hudY += 18;
  }
  if (speedTimer > 0) {
    ctx.fillStyle = '#00CC00';
    ctx.fillText('\uD83D\uDC5F \u52A0\u901F ' + Math.ceil(speedTimer) + 's', 8, hudY);
    hudY += 18;
  }
  if (doubleTimer > 0) {
    ctx.fillStyle = '#DAA520';
    ctx.fillText('\u2716\uFE0F2 x2 ' + Math.ceil(doubleTimer) + 's', 8, hudY);
    hudY += 18;
  }
}

function drawIdle() {
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '20px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('点击 "开始" 按钮开始游戏', W / 2, H / 2 - 10);
  ctx.font = '14px -apple-system, sans-serif';
  ctx.fillText('方向键/触摸 移动 | 自动射击', W / 2, H / 2 + 20);
}

function loop(ts) {
  if (!running || paused || gameOver) return;
  ts = ts || performance.now();
  update(ts);
  draw();
  animId = requestAnimationFrame(loop);
}

// Input
document.addEventListener('keydown', function(e) {
  keys[e.key] = true;
  if (e.key === 'Enter') startGame();
  if (e.key === ' ') { e.preventDefault(); pauseGame(); }
  if (e.key === 'Escape') pauseGame();
});
document.addEventListener('keyup', function(e) { keys[e.key] = false; });

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var rect = canvas.getBoundingClientRect();
  var scaleX = W / rect.width;
  touchX = (e.touches[0].clientX - rect.left) * scaleX;
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  var rect = canvas.getBoundingClientRect();
  var scaleX = W / rect.width;
  touchX = (e.touches[0].clientX - rect.left) * scaleX;
}, { passive: false });
canvas.addEventListener('touchend', function() { touchX = null; });

drawIdle();
</script>
</body>
</html>
