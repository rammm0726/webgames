<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>记忆翻牌</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: linear-gradient(135deg, #667eea, #764ba2);
  min-height: 100vh;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

.top-bar {
  width: 100%;
  max-width: 700px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 8px;
}

.back-btn {
  text-decoration: none;
  color: white;
  background: rgba(255,255,255,0.18);
  padding: 8px 18px;
  border-radius: 30px;
  font-size: 15px;
  transition: background 0.2s;
  white-space: nowrap;
}
.back-btn:hover {
  background: rgba(255,255,255,0.32);
}

.title {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  flex: 1;
  margin: 0 10px;
}

.best-display {
  font-size: 13px;
  background: rgba(255,255,255,0.15);
  padding: 6px 14px;
  border-radius: 20px;
  white-space: nowrap;
}

.hud {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 8px 20px 4px;
  flex-wrap: wrap;
  max-width: 700px;
  width: 100%;
}

.hud-item {
  font-size: 15px;
  background: rgba(255,255,255,0.13);
  padding: 6px 16px;
  border-radius: 20px;
}

.restart-btn {
  font-size: 15px;
  background: rgba(255,255,255,0.2);
  border: none;
  color: white;
  padding: 6px 18px;
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.2s;
}
.restart-btn:hover {
  background: rgba(255,255,255,0.35);
}

.difficulty-row {
  display: flex;
  gap: 10px;
  padding: 8px 20px 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.diff-btn {
  font-size: 14px;
  background: rgba(255,255,255,0.15);
  border: 2px solid transparent;
  color: white;
  padding: 6px 20px;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.2s;
}
.diff-btn:hover {
  background: rgba(255,255,255,0.28);
}
.diff-btn.active {
  background: rgba(255,255,255,0.35);
  border-color: rgba(255,255,255,0.7);
  font-weight: 600;
}

.grid-container {
  display: flex;
  justify-content: center;
  padding: 10px 12px 30px;
  width: 100%;
}

.grid {
  display: grid;
  gap: 9px;
  justify-content: center;
}

.card {
  width: 88px;
  height: 108px;
  perspective: 600px;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.4s ease;
}

.card.flipped .card-inner {
  transform: rotateY(180deg);
}

.card-front, .card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  user-select: none;
}

.card-back {
  background: linear-gradient(135deg, #2c3e6d, #1a1a4e);
  border: 2px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.5);
  font-size: 32px;
  font-weight: 700;
}
.card-back::after {
  content: "?";
}

.card-front {
  background: linear-gradient(135deg, #f8f9ff, #e8ecf8);
  border: 2px solid rgba(100,120,200,0.2);
  transform: rotateY(180deg);
}

.card.matched .card-inner {
  animation: matchPulse 0.45s ease;
}
.card.matched .card-front {
  border-color: #4cdf8b;
  box-shadow: 0 0 16px rgba(76,223,139,0.55);
}

@keyframes matchPulse {
  0% { transform: rotateY(180deg) scale(1); }
  40% { transform: rotateY(180deg) scale(1.12); }
  100% { transform: rotateY(180deg) scale(1); }
}

.card.shake .card-inner {
  animation: cardShake 0.35s ease;
}
@keyframes cardShake {
  0%,100% { transform: rotateY(180deg) translateX(0); }
  25% { transform: rotateY(180deg) translateX(-5px); }
  75% { transform: rotateY(180deg) translateX(5px); }
}

/* Overlay */
.overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.overlay.show {
  display: flex;
}

.overlay-box {
  background: linear-gradient(135deg, #3a3d99, #5b3d8e);
  border-radius: 22px;
  padding: 36px 40px;
  text-align: center;
  max-width: 380px;
  width: 90%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  animation: popIn 0.35s ease;
}
@keyframes popIn {
  0% { transform: scale(0.7); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.overlay-box h2 {
  font-size: 28px;
  margin-bottom: 16px;
}

.overlay-box .stat-line {
  font-size: 16px;
  margin: 6px 0;
  opacity: 0.9;
}

.overlay-box .record-line {
  font-size: 15px;
  margin-top: 12px;
  padding: 8px 16px;
  background: rgba(255,255,255,0.12);
  border-radius: 12px;
  display: inline-block;
}

.new-record {
  color: #ffd700;
  font-weight: 700;
  font-size: 17px;
}

.play-btn {
  margin-top: 22px;
  font-size: 17px;
  background: rgba(255,255,255,0.22);
  border: none;
  color: white;
  padding: 12px 38px;
  border-radius: 30px;
  cursor: pointer;
  transition: background 0.2s;
  font-weight: 600;
}
.play-btn:hover {
  background: rgba(255,255,255,0.38);
}

/* Responsive */
@media (max-width: 600px) {
  .title { font-size: 18px; }
  .top-bar { padding: 12px 12px 6px; }
  .back-btn { padding: 6px 14px; font-size: 13px; }
  .best-display { font-size: 12px; padding: 5px 10px; }
  .hud { gap: 8px; padding: 6px 12px 2px; }
  .hud-item { font-size: 13px; padding: 5px 12px; }
  .restart-btn { font-size: 13px; padding: 5px 14px; }
  .diff-btn { font-size: 13px; padding: 5px 16px; }
  .card { width: 68px; height: 84px; }
  .card-front, .card-back { font-size: 30px; border-radius: 10px; }
  .card-back { font-size: 24px; }
  .grid { gap: 7px; }
  .overlay-box { padding: 28px 24px; }
}

@media (max-width: 400px) {
  .card { width: 58px; height: 72px; }
  .card-front { font-size: 26px; }
  .card-back { font-size: 20px; }
  .grid { gap: 5px; }
}
</style>
</head>
<body>

<div class="top-bar">
  <a href="../../index.html" class="back-btn">← 返回</a>
  <div class="title">记忆翻牌</div>
  <div class="best-display" id="bestDisplay">最佳: --</div>
</div>

<div class="hud">
  <div class="hud-item" id="movesDisplay">步数: 0</div>
  <div class="hud-item" id="timerDisplay">⏱️ 0s</div>
  <button class="restart-btn" id="restartBtn">🔄 重来</button>
</div>

<div class="difficulty-row">
  <button class="diff-btn active" data-diff="easy">简单</button>
  <button class="diff-btn" data-diff="normal">普通</button>
  <button class="diff-btn" data-diff="hard">困难</button>
</div>

<div class="grid-container">
  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="overlay">
  <div class="overlay-box">
    <h2>🎉 恭喜通关!</h2>
    <div class="stat-line" id="overlayDiff"></div>
    <div class="stat-line" id="overlayMoves"></div>
    <div class="stat-line" id="overlayTime"></div>
    <div class="record-line" id="overlayRecord"></div>
    <br>
    <button class="play-btn" id="playAgainBtn">再来一局</button>
  </div>
</div>

<script>
(function() {
  var EMOJIS = ['🍎','🍊','🍋','🍇','🍓','🍑','🍒','🥝','🍌','🍉','🫐','🥭','🍍','🥥','🍈','🍏'];

  var DIFFICULTIES = {
    easy:   { cols: 4, rows: 3, pairs: 6,  label: '简单', storageKey: 'best_memory_easy' },
    normal: { cols: 4, rows: 4, pairs: 8,  label: '普通', storageKey: 'best_memory_normal' },
    hard:   { cols: 6, rows: 4, pairs: 12, label: '困难', storageKey: 'best_memory_hard' }
  };

  var currentDiff = 'easy';
  var cards = [];
  var flippedCards = [];
  var matchedCount = 0;
  var totalPairs = 0;
  var moves = 0;
  var timerSeconds = 0;
  var timerInterval = null;
  var timerStarted = false;
  var locked = false;
  var gameActive = true;

  var gridEl = document.getElementById('grid');
  var movesEl = document.getElementById('movesDisplay');
  var timerEl = document.getElementById('timerDisplay');
  var bestEl = document.getElementById('bestDisplay');
  var overlayEl = document.getElementById('overlay');
  var overlayDiffEl = document.getElementById('overlayDiff');
  var overlayMovesEl = document.getElementById('overlayMoves');
  var overlayTimeEl = document.getElementById('overlayTime');
  var overlayRecordEl = document.getElementById('overlayRecord');

  // Shuffle (Fisher-Yates)
  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i];
      a[i] = a[j];
      a[j] = tmp;
    }
    return a;
  }

  function getBestRecord(diff) {
    try {
      var raw = localStorage.getItem(DIFFICULTIES[diff].storageKey);
      if (raw) return JSON.parse(raw);
    } catch(e) {}
    return null;
  }

  function saveBestRecord(diff, moves, time) {
    var data = { moves: moves, time: time };
    try {
      localStorage.setItem(DIFFICULTIES[diff].storageKey, JSON.stringify(data));
    } catch(e) {}
    return data;
  }

  function updateBestDisplay() {
    var rec = getBestRecord(currentDiff);
    if (rec) {
      bestEl.textContent = '最佳: ' + rec.moves + '步';
    } else {
      bestEl.textContent = '最佳: --';
    }
  }

  function startTimer() {
    if (timerStarted) return;
    timerStarted = true;
    timerSeconds = 0;
    timerInterval = setInterval(function() {
      timerSeconds++;
      timerEl.textContent = '⏱️ ' + timerSeconds + 's';
    }, 1000);
  }

  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }

  function updateMoves() {
    movesEl.textContent = '步数: ' + moves;
  }

  function initGame() {
    stopTimer();
    timerStarted = false;
    timerSeconds = 0;
    moves = 0;
    matchedCount = 0;
    flippedCards = [];
    locked = false;
    gameActive = true;

    timerEl.textContent = '⏱️ 0s';
    updateMoves();
    updateBestDisplay();
    overlayEl.classList.remove('show');

    var cfg = DIFFICULTIES[currentDiff];
    totalPairs = cfg.pairs;

    // Pick and shuffle emojis
    var pool = shuffle(EMOJIS).slice(0, cfg.pairs);
    var deck = shuffle(pool.concat(pool));

    // Set grid columns
    gridEl.style.gridTemplateColumns = 'repeat(' + cfg.cols + ', auto)';

    // Build cards
    gridEl.innerHTML = '';
    cards = [];
    for (var i = 0; i < deck.length; i++) {
      var card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('data-index', i);
      card.setAttribute('data-emoji', deck[i]);

      var inner = document.createElement('div');
      inner.className = 'card-inner';

      var back = document.createElement('div');
      back.className = 'card-back';

      var front = document.createElement('div');
      front.className = 'card-front';
      front.textContent = deck[i];

      inner.appendChild(back);
      inner.appendChild(front);
      card.appendChild(inner);
      gridEl.appendChild(card);
      cards.push(card);

      (function(c) {
        c.addEventListener('click', function() { onCardClick(c); });
      })(card);
    }
  }

  function onCardClick(card) {
    if (!gameActive) return;
    if (locked) return;
    if (card.classList.contains('flipped')) return;
    if (card.classList.contains('matched')) return;

    startTimer();

    card.classList.add('flipped');
    flippedCards.push(card);

    if (flippedCards.length === 2) {
      moves++;
      updateMoves();
      locked = true;

      var c1 = flippedCards[0];
      var c2 = flippedCards[1];

      if (c1.getAttribute('data-emoji') === c2.getAttribute('data-emoji')) {
        // Match
        setTimeout(function() {
          c1.classList.add('matched');
          c2.classList.add('matched');
          matchedCount++;
          flippedCards = [];
          locked = false;

          if (matchedCount === totalPairs) {
            onWin();
          }
        }, 300);
      } else {
        // No match - shake then flip back
        setTimeout(function() {
          c1.classList.add('shake');
          c2.classList.add('shake');
        }, 400);

        setTimeout(function() {
          c1.classList.remove('flipped', 'shake');
          c2.classList.remove('flipped', 'shake');
          flippedCards = [];
          locked = false;
        }, 800);
      }
    }
  }

  function onWin() {
    gameActive = false;
    stopTimer();

    var cfg = DIFFICULTIES[currentDiff];
    var prevBest = getBestRecord(currentDiff);
    var isNewRecord = false;

    if (!prevBest || moves < prevBest.moves || (moves === prevBest.moves && timerSeconds < prevBest.time)) {
      saveBestRecord(currentDiff, moves, timerSeconds);
      isNewRecord = true;
    }

    overlayDiffEl.textContent = '难度: ' + cfg.label;
    overlayMovesEl.textContent = '步数: ' + moves;
    overlayTimeEl.textContent = '用时: ' + timerSeconds + 's';

    if (isNewRecord) {
      overlayRecordEl.innerHTML = '<span class="new-record">🏆 新纪录!</span>';
    } else if (prevBest) {
      overlayRecordEl.textContent = '最佳记录: ' + prevBest.moves + '步 / ' + prevBest.time + 's';
    } else {
      overlayRecordEl.textContent = '';
    }

    updateBestDisplay();

    setTimeout(function() {
      overlayEl.classList.add('show');
    }, 500);
  }

  // Difficulty buttons
  var diffBtns = document.querySelectorAll('.diff-btn');
  for (var i = 0; i < diffBtns.length; i++) {
    (function(btn) {
      btn.addEventListener('click', function() {
        for (var j = 0; j < diffBtns.length; j++) {
          diffBtns[j].classList.remove('active');
        }
        btn.classList.add('active');
        currentDiff = btn.getAttribute('data-diff');
        initGame();
      });
    })(diffBtns[i]);
  }

  // Restart button
  document.getElementById('restartBtn').addEventListener('click', function() {
    initGame();
  });

  // Play again button
  document.getElementById('playAgainBtn').addEventListener('click', function() {
    initGame();
  });

  // Keyboard controls
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      initGame();
    } else if (e.key === 'Escape') {
      window.location.href = '../../index.html';
    }
  });

  // Click overlay background to close
  overlayEl.addEventListener('click', function(e) {
    if (e.target === overlayEl) {
      overlayEl.classList.remove('show');
    }
  });

  // Start
  initGame();
})();
</script>

</body>
</html>
