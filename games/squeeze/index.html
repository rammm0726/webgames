<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>挤压玩具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f0f1a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            color: #e0e0e0;
            overflow: hidden;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }
        .title {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .squeeze-area {
            width: 300px;
            height: 300px;
            background: #1a1a2e;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }
        .squeeze-item {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            transition: all 0.1s ease;
            position: relative;
        }
        .squeeze-item::before {
            content: '😊';
            position: absolute;
            font-size: 3rem;
        }
        .squeeze-item.squeezed {
            transform: scale(0.7);
            border-radius: 60%;
        }
        .squeeze-item.squeezed::before {
            content: '😆';
        }
        .counter {
            font-size: 2rem;
            font-weight: bold;
            color: #a855f7;
        }
        .btn {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .instructions {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title">挤压玩具 😊</div>
        <div class="squeeze-area" id="squeezeArea">
            <div class="squeeze-item" id="squeezeItem"></div>
        </div>
        <div class="counter">挤压次数: <span id="count">0</span></div>
        <button class="btn" onclick="resetCount()">重置计数</button>
        <div class="instructions">点击或按住挤压玩具，释放压力！</div>
    </div>

    <script>
        let count = 0;
        const item = document.getElementById('squeezeItem');
        const area = document.getElementById('squeezeArea');

        function squeeze() {
            item.classList.add('squeezed');
            count++;
            document.getElementById('count').textContent = count;
        }

        function release() {
            item.classList.remove('squeezed');
        }

        area.addEventListener('mousedown', squeeze);
        area.addEventListener('mouseup', release);
        area.addEventListener('mouseleave', release);
        
        area.addEventListener('touchstart', (e) => {
            e.preventDefault();
            squeeze();
        });
        area.addEventListener('touchend', release);

        function resetCount() {
            count = 0;
            document.getElementById('count').textContent = count;
        }
    </script>
</body>
</html>
