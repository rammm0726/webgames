<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打砖块</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f0f1a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            color: #e0e0e0;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .title {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #22c55e, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats {
            display: flex;
            gap: 2rem;
        }
        .stat-box {
            background: rgba(34, 197, 94, 0.3);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            text-align: center;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #888;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .canvas-container {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 10px;
        }
        #gameCanvas {
            display: block;
            background: #16162a;
            border-radius: 8px;
        }
        .btn {
            background: linear-gradient(135deg, #22c55e, #10b981);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .instructions {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
        }
        .game-over {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }
        .game-over h2 { color: #22c55e; font-size: 2rem; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title">打砖块 🧱</div>
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">分数</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">生命</div>
                <div class="stat-value" id="lives">3</div>
            </div>
        </div>
        <div class="canvas-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>
        <button class="btn" id="startBtn" onclick="startGame()">开始游戏</button>
        <div class="instructions">使用 ← → 方向键控制挡板，空格键发射球！</div>
    </div>

    <div class="game-over hidden" id="gameOver">
        <h2>游戏结束</h2>
        <p>最终分数: <span id="finalScore">0</span></p>
        <button class="btn" onclick="document.getElementById('gameOver').classList.add('hidden'); startGame()">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let paddle = { x: 150, y: 370, width: 100, height: 15 };
        let ball = { x: 200, y: 355, radius: 8, dx: 3, dy: -3 };
        let bricks = [];
        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let gameLoop;
        let keys = {};
        let ballLaunched = false;

        const colors = ['#22c55e', '#10b981', '#06b6d4', '#3b82f6', '#8b5cf6'];

        function initBricks() {
            bricks = [];
            for (let row = 0; row < 5; row++) {
                for (let col = 0; col < 10; col++) {
                    bricks.push({
                        x: col * 40,
                        y: row * 25 + 30,
                        width: 35,
                        height: 20,
                        color: colors[row],
                        visible: true
                    });
                }
            }
        }

        function drawPaddle() {
            ctx.fillStyle = '#22c55e';
            ctx.fillRect(paddle.x, paddle.y, paddle.width, paddle.height);
        }

        function drawBall() {
            ctx.fillStyle = '#e0e0e0';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawBricks() {
            bricks.forEach(brick => {
                if (brick.visible) {
                    ctx.fillStyle = brick.color;
                    ctx.fillRect(brick.x, brick.y, brick.width, brick.height);
                    
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(brick.x, brick.y, brick.width, 3);
                }
            });
        }

        function update() {
            if (!gameRunning) return;
            
            if (keys['ArrowLeft'] && paddle.x > 0) paddle.x -= 6;
            if (keys['ArrowRight'] && paddle.x < canvas.width - paddle.width) paddle.x += 6;
            
            if (!ballLaunched) {
                ball.x = paddle.x + paddle.width / 2;
                ball.y = paddle.y - ball.radius;
                return;
            }
            
            ball.x += ball.dx;
            ball.y += ball.dy;
            
            if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) {
                ball.dx *= -1;
            }
            
            if (ball.y - ball.radius < 0) {
                ball.dy *= -1;
            }
            
            if (ball.y + ball.radius > canvas.height) {
                lives--;
                document.getElementById('lives').textContent = lives;
                
                if (lives <= 0) {
                    endGame();
                    return;
                }
                
                ballLaunched = false;
                ball.x = paddle.x + paddle.width / 2;
                ball.y = paddle.y - ball.radius;
                ball.dx = 3 * (Math.random() > 0.5 ? 1 : -1);
                ball.dy = -3;
            }
            
            if (ball.y + ball.radius > paddle.y &&
                ball.y - ball.radius < paddle.y + paddle.height &&
                ball.x > paddle.x &&
                ball.x < paddle.x + paddle.width) {
                ball.dy *= -1;
                ball.dx += (ball.x - (paddle.x + paddle.width / 2)) / 20;
            }
            
            bricks.forEach(brick => {
                if (brick.visible) {
                    if (ball.x > brick.x &&
                        ball.x < brick.x + brick.width &&
                        ball.y > brick.y &&
                        ball.y < brick.y + brick.height) {
                        brick.visible = false;
                        ball.dy *= -1;
                        score += 10;
                        document.getElementById('score').textContent = score;
                        
                        if (bricks.every(b => !b.visible)) {
                            initBricks();
                            score += 100;
                            document.getElementById('score').textContent = score;
                        }
                    }
                }
            });
        }

        function draw() {
            ctx.fillStyle = '#16162a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawBricks();
            drawPaddle();
            drawBall();
        }

        function gameLoopFn() {
            update();
            draw();
            gameLoop = requestAnimationFrame(gameLoopFn);
        }

        function startGame() {
            score = 0;
            lives = 3;
            ballLaunched = false;
            
            document.getElementById('score').textContent = score;
            document.getElementById('lives').textContent = lives;
            document.getElementById('startBtn').disabled = true;
            
            paddle = { x: 150, y: 370, width: 100, height: 15 };
            ball = { x: 200, y: 355, radius: 8, dx: 3, dy: -3 };
            initBricks();
            
            gameRunning = true;
            gameLoopFn();
        }

        function endGame() {
            gameRunning = false;
            cancelAnimationFrame(gameLoop);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.remove('hidden');
        }

        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ' && !ballLaunched && gameRunning) {
                ballLaunched = true;
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        draw();
    </script>
</body>
</html>
