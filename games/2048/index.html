<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f0f1a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            color: #e0e0e0;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .header {
            display: flex;
            justify-content: space-between;
            width: 320px;
            align-items: center;
        }
        .title {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .score-box {
            background: rgba(168, 85, 247, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            text-align: center;
        }
        .score-label {
            font-size: 0.7rem;
            color: #888;
        }
        .score {
            font-size: 1.2rem;
            font-weight: bold;
        }
        .board {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .cell {
            width: 70px;
            height: 70px;
            background: #16162a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            transition: all 0.15s ease;
        }
        .cell-2 { background: #eee4da; color: #776e65; }
        .cell-4 { background: #ede0c8; color: #776e65; }
        .cell-8 { background: #f2b179; color: #f9f6f2; }
        .cell-16 { background: #f59563; color: #f9f6f2; }
        .cell-32 { background: #f67c5f; color: #f9f6f2; }
        .cell-64 { background: #f65e3b; color: #f9f6f2; }
        .cell-128 { background: #edcf72; color: #f9f6f2; }
        .cell-256 { background: #edcc61; color: #f9f6f2; }
        .cell-512 { background: #edc850; color: #f9f6f2; }
        .cell-1024 { background: #edc53f; color: #f9f6f2; }
        .cell-2048 { background: #edc22e; color: #f9f6f2; }
        .btn {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .instructions {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
            margin-top: 1rem;
        }
        .game-over, .pause-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }
        .game-over h2, .pause-overlay h2 { font-size: 2rem; }
        .game-over h2 { color: #ec4899; }
        .pause-overlay h2 { color: #a855f7; }
        .hidden { display: none; }
        .start-screen {
            position: fixed;
            inset: 0;
            background: rgba(15, 15, 26, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2rem;
            z-index: 1000;
        }
        .start-screen h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .start-screen p { color: #888; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">2048</div>
            <div class="score-box">
                <div class="score-label">分数</div>
                <div class="score" id="score">0</div>
            </div>
        </div>
        <div class="board" id="board"></div>
        <button class="btn" onclick="newGame()">新游戏</button>
        <div class="instructions">
            使用 ↑ ↓ ← → 方向键移动<br>相同数字合并，达到2048获胜！
        </div>
    </div>
    
    <div class="game-over hidden" id="gameOver">
        <h2>游戏结束</h2>
        <p>最终分数: <span id="finalScore">0</span></p>
        <button class="btn" onclick="newGame(); document.getElementById('gameOver').classList.add('hidden')">再来一局</button>
    </div>

    <div class="pause-overlay hidden" id="pauseOverlay">
        <h2>⏸️ 游戏暂停</h2>
        <p>按 ESC 继续游戏</p>
    </div>

    <div class="start-screen" id="startScreen">
        <h1>2048</h1>
        <p>按 空格键 或 Enter 开始游戏</p>
        <button class="btn" onclick="startGame()">开始游戏</button>
        <p style="font-size: 0.9rem; color: #666;">使用 ↑ ↓ ← → 方向键移动</p>
    </div>

    <script>
        const board = [];
        let score = 0;
        let paused = false;
        let gameStarted = false;

        function initBoard() {
            for (let i = 0; i < 4; i++) {
                board[i] = [0, 0, 0, 0];
            }
            score = 0;
            updateScore();
            addRandomTile();
            addRandomTile();
            render();
        }

        function addRandomTile() {
            const emptyCells = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 0) {
                        emptyCells.push({ row: i, col: j });
                    }
                }
            }
            if (emptyCells.length > 0) {
                const { row, col } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                board[row][col] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function render() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const cell = document.createElement('div');
                    cell.className = `cell${board[i][j] ? ` cell-${board[i][j]}` : ''}`;
                    cell.textContent = board[i][j] || '';
                    boardEl.appendChild(cell);
                }
            }
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function move(direction) {
            let moved = false;
            
            function slide(row) {
                let arr = row.filter(n => n !== 0);
                for (let i = 0; i < arr.length - 1; i++) {
                    if (arr[i] === arr[i + 1]) {
                        arr[i] *= 2;
                        score += arr[i];
                        arr.splice(i + 1, 1);
                        moved = true;
                    }
                }
                while (arr.length < 4) arr.push(0);
                return arr;
            }

            if (direction === 'left') {
                for (let i = 0; i < 4; i++) {
                    const newRow = slide(board[i]);
                    if (JSON.stringify(board[i]) !== JSON.stringify(newRow)) moved = true;
                    board[i] = newRow;
                }
            } else if (direction === 'right') {
                for (let i = 0; i < 4; i++) {
                    const newRow = slide([...board[i]].reverse()).reverse();
                    if (JSON.stringify(board[i]) !== JSON.stringify(newRow)) moved = true;
                    board[i] = newRow;
                }
            } else if (direction === 'up') {
                for (let j = 0; j < 4; j++) {
                    const col = [board[0][j], board[1][j], board[2][j], board[3][j]];
                    const newCol = slide(col);
                    for (let i = 0; i < 4; i++) {
                        if (board[i][j] !== newCol[i]) moved = true;
                        board[i][j] = newCol[i];
                    }
                }
            } else if (direction === 'down') {
                for (let j = 0; j < 4; j++) {
                    const col = [board[0][j], board[1][j], board[2][j], board[3][j]];
                    const newCol = slide([...col].reverse()).reverse();
                    for (let i = 0; i < 4; i++) {
                        if (board[i][j] !== newCol[i]) moved = true;
                        board[i][j] = newCol[i];
                    }
                }
            }

            if (moved) {
                addRandomTile();
                updateScore();
                render();
                checkGameOver();
            }
        }

        function checkGameOver() {
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 2048) {
                        document.getElementById('finalScore').textContent = score;
                        document.getElementById('gameOver').style.display = 'flex';
                        return;
                    }
                    if (board[i][j] === 0) return;
                    if (j < 3 && board[i][j] === board[i][j + 1]) return;
                    if (i < 3 && board[i][j] === board[i + 1][j]) return;
                }
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'flex';
        }

        function newGame() {
            paused = false;
            gameStarted = true;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('pauseOverlay').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            initBoard();
        }

        function togglePause() {
            if (!gameStarted) return;
            paused = !paused;
            const overlay = document.getElementById('pauseOverlay');
            if (paused) {
                overlay.style.display = 'flex';
            } else {
                overlay.style.display = 'none';
            }
        }

        function startGame() {
            newGame();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                togglePause();
                return;
            }
            
            if (!gameStarted) {
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    startGame();
                }
                return;
            }
            
            if (paused) return;
            
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                const dir = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right' }[e.key];
                move(dir);
            }
        });

        initBoard();
    </script>
</body>
</html>
