<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2048</title>
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="../../css/reset.css">
  <link rel="stylesheet" href="../../css/game.css">
  <style>
    .board-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 12px;
      background: rgba(139, 126, 118, 0.8);
      border-radius: 12px;
    }
    .cell {
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-weight: 700;
      font-size: 28px;
      color: white;
      transition: all 0.15s ease;
    }
    .cell-0 { background: rgba(238, 228, 218, 0.5); color: transparent; }
    .cell-2 { background: #EEE4DA; color: #776E65; }
    .cell-4 { background: #EDE0C8; color: #776E65; }
    .cell-8 { background: #F2B179; }
    .cell-16 { background: #F59563; }
    .cell-32 { background: #F67C5F; }
    .cell-64 { background: #F65E3B; }
    .cell-128 { background: #EDCF72; font-size: 22px; }
    .cell-256 { background: #EDCC61; font-size: 22px; }
    .cell-512 { background: #EDC850; font-size: 22px; }
    .cell-1024 { background: #EDC53F; font-size: 18px; }
    .cell-2048 { background: #EDC22E; font-size: 18px; }
    .cell-max { background: #3C3A32; font-size: 14px; }
    .score-row {
      display: flex;
      gap: 12px;
    }
    .score-box {
      background: rgba(255, 255, 255, 0.2);
      padding: 12px 24px;
      border-radius: 12px;
      text-align: center;
    }
    .score-box .label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      text-transform: uppercase;
    }
    .score-box .value {
      font-size: 24px;
      font-weight: 700;
      color: white;
    }
    @media (max-width: 480px) {
      .cell {
        width: 64px;
        height: 64px;
        font-size: 24px;
      }
    }
  </style>
</head>
<body class="game-page">
  <div class="game-topbar">
    <button class="back-btn">← 返回</button>
    <span class="game-title">2048</span>
    <span class="game-score" id="currentScore">0</span>
  </div>

  <div class="game-controls">
    <button class="control-btn start-btn" onclick="init2048()">▶️ 开始</button>
    <button class="control-btn help-btn" onclick="showHelp()">❓ 帮助</button>
  </div>

  <div class="game-container">
    <div class="board-container">
      <div class="score-row">
        <div class="score-box">
          <div class="label">当前</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="score-box">
          <div class="label">最高</div>
          <div class="value" id="best">0</div>
        </div>
      </div>
      <div class="board" id="board"></div>
    </div>
  </div>

  <div class="game-over-overlay">
    <div class="game-over-box">
      <h2>游戏结束</h2>
      <div class="final-score">0</div>
      <button class="btn btn-primary restart-btn">再来一局</button>
    </div>
  </div>

  <div class="help-overlay">
    <div class="help-box">
      <h2>❓ 游戏说明</h2>
      <div class="help-content">
        <ul>
          <li>🎮 使用方向键或滑动屏幕移动方块</li>
          <li>🔢 相同数字会合并成更大的数字</li>
          <li>🎯 目标是合成 2048！</li>
          <li>📱 手机：上下左右滑动</li>
          <li>⌨️ 电脑：方向键控制</li>
          <li>⌨️ Enter=开始 Esc=返回</li>
          <li>🏆 挑战最高分！</li>
        </ul>
      </div>
      <button class="btn btn-primary close-btn" onclick="hideHelp()">知道了</button>
    </div>
  </div>

  <script src="../../js/common.js"></script>
  <script>
    let grid, score2048, bestScore;

    function init2048() {
      grid = Array.from({ length: 4 }, () => Array(4).fill(0));
      score2048 = 0;
      bestScore = getBestScore('2048');
      addRandomTile();
      addRandomTile();
      render();
      document.querySelector('.game-over-overlay').classList.remove('show');
      gameStarted = true;
    }

    function addRandomTile() {
      const empty = [];
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++)
          if (grid[r][c] === 0) empty.push({ r, c });
      if (empty.length === 0) return;
      const { r, c } = empty[Math.floor(Math.random() * empty.length)];
      grid[r][c] = Math.random() < 0.9 ? 2 : 4;
    }

    function render() {
      const board = document.getElementById('board');
      board.innerHTML = grid.map(row =>
        row.map(val => {
          const cls = val <= 2048 ? `cell-${val}` : 'cell-max';
          return `<div class="cell ${cls}">${val || ''}</div>`;
        }).join('')
      ).join('');
      document.getElementById('score').textContent = score2048;
      document.getElementById('currentScore').textContent = score2048;
      document.getElementById('best').textContent = bestScore;
    }

    function slide(row) {
      let arr = row.filter(v => v !== 0);
      for (let i = 0; i < arr.length - 1; i++) {
        if (arr[i] === arr[i + 1]) {
          arr[i] *= 2;
          score2048 += arr[i];
          arr.splice(i + 1, 1);
        }
      }
      while (arr.length < 4) arr.push(0);
      return arr;
    }

    function move(dir) {
      if (!gameStarted || gamePaused) return;
      let moved = false;
      const oldGrid = grid.map(r => [...r]);

      if (dir === 'left') {
        grid = grid.map(row => slide(row));
      } else if (dir === 'right') {
        grid = grid.map(row => slide([...row].reverse()).reverse());
      } else if (dir === 'up') {
        for (let c = 0; c < 4; c++) {
          const col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
          const slid = slide(col);
          for (let r = 0; r < 4; r++) grid[r][c] = slid[r];
        }
      } else if (dir === 'down') {
        for (let c = 0; c < 4; c++) {
          const col = [grid[3][c], grid[2][c], grid[1][c], grid[0][c]];
          const slid = slide(col);
          for (let r = 0; r < 4; r++) grid[r][c] = slid[3 - r];
        }
      }

      moved = grid.some((row, r) => row.some((v, c) => v !== oldGrid[r][c]));
      if (moved) {
        addRandomTile();
        render();
        if (score2048 > bestScore) {
          bestScore = score2048;
          setBestScore('2048', score2048);
        }
        if (isGameOver()) {
          playSound('gameover');
          showGameOver(score2048, init2048);
        }
      }
    }

    function isGameOver() {
      for (let r = 0; r < 4; r++)
        for (let c = 0; c < 4; c++) {
          if (grid[r][c] === 0) return false;
          if (c < 3 && grid[r][c] === grid[r][c + 1]) return false;
          if (r < 3 && grid[r][c] === grid[r + 1][c]) return false;
        }
      return true;
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { init2048(); return; }
      if (e.key === 'Escape') {
        e.preventDefault();
        window.location.href = '../../index.html';
        return;
      }
      const keyMap = {
        'ArrowUp': 'up', 'ArrowDown': 'down', 'ArrowLeft': 'left', 'ArrowRight': 'right'
      };
      if (keyMap[e.key]) {
        e.preventDefault();
        move(keyMap[e.key]);
      }
    });

    let touchStartX, touchStartY;
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    });
    document.addEventListener('touchend', (e) => {
      if (!touchStartX || !touchStartY) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);
      if (Math.max(absDx, absDy) < 30) return;
      if (absDx > absDy) {
        move(dx > 0 ? 'right' : 'left');
      } else {
        move(dy > 0 ? 'down' : 'up');
      }
    });

    initGamePage('2048');
    init2048();
  </script>
</body>
</html>
