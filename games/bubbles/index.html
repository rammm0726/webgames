<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>泡泡消除</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f0f1a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            color: #e0e0e0;
            overflow: hidden;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .title {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #f472b6, #fb923c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .score-box {
            background: rgba(244, 114, 182, 0.3);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            text-align: center;
        }
        .score-label {
            font-size: 0.7rem;
            color: #888;
        }
        .score {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .canvas-container {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 10px;
            position: relative;
            overflow: hidden;
        }
        #gameCanvas {
            display: block;
            background: #16162a;
            border-radius: 8px;
        }
        .btn {
            background: linear-gradient(135deg, #f472b6, #fb923c);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .instructions {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title">泡泡消除 🫧</div>
        <div class="score-box">
            <div class="score-label">分数</div>
            <div class="score" id="score">0</div>
        </div>
        <div class="canvas-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>
        <button class="btn" onclick="restart()">重新开始</button>
        <div class="instructions">点击泡泡消除它们，连续消除更多获得更高分数！</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let bubbles = [];
        let animationId;

        const colors = [
            '#f472b6', '#fb923c', '#fbbf24', '#34d399', 
            '#60a5fa', '#a78bfa', '#f87171', '#38bdf8'
        ];

        function Bubble(x, y, radius, color) {
            this.x = x;
            this.y = y;
            this.radius = radius;
            this.color = color;
            this.vx = (Math.random() - 0.5) * 0.5;
            this.vy = (Math.random() - 0.5) * 0.5;
            this.pulse = Math.random() * Math.PI * 2;
            this.pulseSpeed = 0.02 + Math.random() * 0.02;
        }

        Bubble.prototype.update = function() {
            this.x += this.vx;
            this.y += this.vy;
            this.pulse += this.pulseSpeed;
            
            if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) {
                this.vx *= -1;
            }
            if (this.y - this.radius < 0 || this.y + this.radius > canvas.height) {
                this.vy *= -1;
            }
        };

        Bubble.prototype.draw = function() {
            const pulseSize = Math.sin(this.pulse) * 3;
            const r = this.radius + pulseSize;
            
            const gradient = ctx.createRadialGradient(
                this.x - r * 0.3, this.y - r * 0.3, 0,
                this.x, this.y, r
            );
            gradient.addColorStop(0, 'rgba(255,255,255,0.4)');
            gradient.addColorStop(0.5, this.color);
            gradient.addColorStop(1, this.color + '88');
            
            ctx.beginPath();
            ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(this.x - r * 0.3, this.y - r * 0.3, r * 0.2, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fill();
        };

        Bubble.prototype.contains = function(x, y) {
            const dx = this.x - x;
            const dy = this.y - y;
            return dx * dx + dy * dy <= this.radius * this.radius;
        };

        function init() {
            bubbles = [];
            score = 0;
            updateScore();
            
            for (let i = 0; i < 15; i++) {
                const radius = 20 + Math.random() * 25;
                const x = radius + Math.random() * (canvas.width - radius * 2);
                const y = radius + Math.random() * (canvas.height - radius * 2);
                const color = colors[Math.floor(Math.random() * colors.length)];
                bubbles.push(new Bubble(x, y, radius, color));
            }
            
            if (animationId) cancelAnimationFrame(animationId);
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            bubbles.forEach(bubble => {
                bubble.update();
                bubble.draw();
            });
            
            animationId = requestAnimationFrame(animate);
        }

        function getNeighbors(bubble) {
            const neighbors = [];
            bubbles.forEach(other => {
                if (other !== bubble && bubble.color === other.color) {
                    const dx = bubble.x - other.x;
                    const dy = bubble.y - other.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < bubble.radius + other.radius + 10) {
                        neighbors.push(other);
                    }
                }
            });
            return neighbors;
        }

        function removeConnected(bubble, removed = new Set()) {
            if (removed.has(bubble)) return;
            removed.add(bubble);
            
            const neighbors = getNeighbors(bubble);
            neighbors.forEach(neighbor => {
                removeConnected(neighbor, removed);
            });
            
            return removed;
        }

        function handleClick(e) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            for (let i = bubbles.length - 1; i >= 0; i--) {
                if (bubbles[i].contains(x, y)) {
                    const removed = removeConnected(bubbles[i]);
                    const count = removed.size;
                    
                    bubbles = bubbles.filter(b => !removed.has(b));
                    
                    const points = count * 10 + (count > 3 ? (count - 3) * 20 : 0);
                    score += points;
                    updateScore();
                    
                    if (bubbles.length === 0) {
                        init();
                    }
                    break;
                }
            }
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function restart() {
            init();
        }

        canvas.addEventListener('click', handleClick);
        init();
    </script>
</body>
</html>
