<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拼图游戏</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f0f1a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            color: #e0e0e0;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .title {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats {
            display: flex;
            gap: 2rem;
        }
        .stat-box {
            background: rgba(99, 102, 241, 0.3);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            text-align: center;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #888;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .board {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .tile {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            color: white;
        }
        .tile:hover { transform: scale(1.05); }
        .tile.empty {
            background: #16162a;
            cursor: default;
        }
        .tile.empty:hover { transform: none; }
        .btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .instructions {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
        }
        .game-over, .pause-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }
        .game-over h2, .pause-overlay h2 { font-size: 2rem; }
        .game-over h2 { color: #6366f1; }
        .pause-overlay h2 { color: #a855f7; }
        .hidden { display: none; }
        .start-screen {
            position: fixed;
            inset: 0;
            background: rgba(15, 15, 26, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2rem;
        }
        .start-screen h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .start-screen p { color: #888; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title">拼图游戏 🧩</div>
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">步数</div>
                <div class="stat-value" id="moves">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">时间</div>
                <div class="stat-value" id="time">0</div>
            </div>
        </div>
        <div class="board" id="board"></div>
        <button class="btn" onclick="shuffle()">打乱拼图</button>
        <div class="instructions">点击数字方块移动，将数字按顺序排列！</div>
    </div>

    <div class="game-over hidden" id="gameOver">
        <h2>恭喜完成！🎉</h2>
        <p>用时: <span id="finalTime">0</span> 秒 | 步数: <span id="finalMoves">0</span></p>
        <button class="btn" onclick="document.getElementById('gameOver').classList.add('hidden'); shuffle()">再来一局</button>
    </div>

    <div class="pause-overlay hidden" id="pauseOverlay">
        <h2>⏸️ 游戏暂停</h2>
        <p>按 ESC 继续游戏</p>
    </div>

    <div class="start-screen" id="startScreen">
        <h1>🧩 拼图游戏</h1>
        <p>按 空格键 或 Enter 开始游戏</p>
        <button class="btn" onclick="shuffle()">开始游戏</button>
        <p style="font-size: 0.9rem; color: #666;">点击数字方块移动，将数字按顺序排列！</p>
    </div>

    <script>
        let tiles = [1, 2, 3, 4, 5, 6, 7, 8, 0];
        let moves = 0;
        let time = 0;
        let timerInterval;
        let paused = false;
        let gameStarted = false;

        function render() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            tiles.forEach((tile, index) => {
                const tileEl = document.createElement('div');
                tileEl.className = `tile${tile === 0 ? ' empty' : ''}`;
                tileEl.textContent = tile || '';
                tileEl.addEventListener('click', () => moveTile(index));
                board.appendChild(tileEl);
            });
        }

        function moveTile(index) {
            const emptyIndex = tiles.indexOf(0);
            const row = Math.floor(index / 3);
            const col = index % 3;
            const emptyRow = Math.floor(emptyIndex / 3);
            const emptyCol = emptyIndex % 3;
            
            const isAdjacent = 
                (Math.abs(row - emptyRow) === 1 && col === emptyCol) ||
                (Math.abs(col - emptyCol) === 1 && row === emptyRow);
            
            if (isAdjacent) {
                [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
                moves++;
                document.getElementById('moves').textContent = moves;
                render();
                checkWin();
            }
        }

        function checkWin() {
            const winState = [1, 2, 3, 4, 5, 6, 7, 8, 0];
            if (tiles.every((tile, index) => tile === winState[index])) {
                clearInterval(timerInterval);
                document.getElementById('finalTime').textContent = time;
                document.getElementById('finalMoves').textContent = moves;
                document.getElementById('gameOver').classList.remove('hidden');
            }
        }

        function shuffle() {
            tiles = [1, 2, 3, 4, 5, 6, 7, 8, 0];
            moves = 0;
            time = 0;
            paused = false;
            gameStarted = true;
            
            document.getElementById('moves').textContent = moves;
            document.getElementById('time').textContent = time;
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('pauseOverlay').classList.add('hidden');
            
            for (let i = tiles.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
            }
            
            if (!isSolvable()) {
                shuffle();
                return;
            }
            
            render();
            
            timerInterval = setInterval(() => {
                if (!paused) {
                    time++;
                    document.getElementById('time').textContent = time;
                }
            }, 1000);
        }

        function togglePause() {
            if (!gameStarted) return;
            paused = !paused;
            const overlay = document.getElementById('pauseOverlay');
            if (paused) {
                overlay.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                togglePause();
                return;
            }
            
            if (!gameStarted) {
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    shuffle();
                }
                return;
            }
            
            if (paused) return;
        });

        function isSolvable() {
            let inversions = 0;
            const arr = tiles.filter(t => t !== 0);
            
            for (let i = 0; i < arr.length; i++) {
                for (let j = i + 1; j < arr.length; j++) {
                    if (arr[i] > arr[j]) inversions++;
                }
            }
            
            return inversions % 2 === 0;
        }

        shuffle();
    </script>
</body>
</html>
