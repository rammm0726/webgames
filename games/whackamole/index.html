<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打地鼠</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f0f1a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            color: #e0e0e0;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .title {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #22c55e, #14b8a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats {
            display: flex;
            gap: 2rem;
        }
        .stat-box {
            background: rgba(34, 197, 94, 0.3);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            text-align: center;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #888;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .board {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .hole {
            width: 100px;
            height: 100px;
            background: #16162a;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid #22c55e;
        }
        .hole::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 30%;
            background: #0f0f1a;
            border-radius: 50%;
        }
        .mole {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 70px;
            transition: bottom 0.2s ease;
            cursor: pointer;
        }
        .mole.active {
            bottom: 5px;
        }
        .mole img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .mole::before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 50% 50% 45% 45%;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.3);
        }
        .mole::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 15px;
            background: linear-gradient(135deg, #fcd34d, #fbbf24);
            border-radius: 50%;
        }
        .btn {
            background: linear-gradient(135deg, #22c55e, #14b8a6);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .instructions {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
        }
        .game-over, .pause-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }
        .game-over h2, .pause-overlay h2 { font-size: 2rem; }
        .game-over h2 { color: #22c55e; }
        .pause-overlay h2 { color: #a855f7; }
        .hidden { display: none; }
        .start-screen {
            position: fixed;
            inset: 0;
            background: rgba(15, 15, 26, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2rem;
        }
        .start-screen h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #22c55e, #14b8a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .start-screen p { color: #888; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title">打地鼠 🐹</div>
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">分数</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">时间</div>
                <div class="stat-value" id="time">30</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">生命</div>
                <div class="stat-value" id="lives">3</div>
            </div>
        </div>
        <div class="board">
            <div class="hole" onclick="whack(0)"><div class="mole" id="mole0"></div></div>
            <div class="hole" onclick="whack(1)"><div class="mole" id="mole1"></div></div>
            <div class="hole" onclick="whack(2)"><div class="mole" id="mole2"></div></div>
            <div class="hole" onclick="whack(3)"><div class="mole" id="mole3"></div></div>
            <div class="hole" onclick="whack(4)"><div class="mole" id="mole4"></div></div>
            <div class="hole" onclick="whack(5)"><div class="mole" id="mole5"></div></div>
            <div class="hole" onclick="whack(6)"><div class="mole" id="mole6"></div></div>
            <div class="hole" onclick="whack(7)"><div class="mole" id="mole7"></div></div>
            <div class="hole" onclick="whack(8)"><div class="mole" id="mole8"></div></div>
        </div>
        <button class="btn" id="startBtn" onclick="startGame()">开始游戏</button>
        <div class="instructions">点击冒出的地鼠获得分数，漏掉会损失生命值！</div>
    </div>

    <div class="game-over hidden" id="gameOver">
        <h2>游戏结束</h2>
        <p>最终分数: <span id="finalScore">0</span></p>
        <button class="btn" onclick="document.getElementById('gameOver').classList.add('hidden'); startGame()">再来一局</button>
    </div>

    <div class="pause-overlay hidden" id="pauseOverlay">
        <h2>⏸️ 游戏暂停</h2>
        <p>按 ESC 继续游戏</p>
    </div>

    <div class="start-screen" id="startScreen">
        <h1>🐹 打地鼠</h1>
        <p>按 空格键 或 Enter 开始游戏</p>
        <button class="btn" onclick="startGame()">开始游戏</button>
        <p style="font-size: 0.9rem; color: #666;">点击冒出的地鼠获得分数！</p>
    </div>

    <script>
        let score = 0;
        let time = 30;
        let lives = 3;
        let gameRunning = false;
        let timerInterval;
        let moleInterval;
        let activeMole = -1;
        let paused = false;
        let gameStarted = false;

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = time;
            document.getElementById('lives').textContent = lives;
        }

        function showMole() {
            if (!gameRunning) return;
            
            if (activeMole !== -1) {
                hideMole();
            }
            
            const randomHole = Math.floor(Math.random() * 9);
            activeMole = randomHole;
            document.getElementById(`mole${randomHole}`).classList.add('active');
            
            setTimeout(() => {
                if (activeMole === randomHole && gameRunning) {
                    hideMole();
                    lives--;
                    updateStats();
                    if (lives <= 0) {
                        endGame();
                    }
                }
            }, 800 + Math.random() * 400);
        }

        function hideMole() {
            if (activeMole !== -1) {
                document.getElementById(`mole${activeMole}`).classList.remove('active');
                activeMole = -1;
            }
        }

        function whack(holeIndex) {
            if (!gameRunning || paused) return;
            
            if (activeMole === holeIndex) {
                hideMole();
                score += 10;
                updateStats();
            }
        }

        function startGame() {
            score = 0;
            time = 30;
            lives = 3;
            gameRunning = true;
            activeMole = -1;
            paused = false;
            gameStarted = true;
            
            updateStats();
            document.getElementById('startBtn').disabled = true;
            document.getElementById('gameOver').classList.add('hidden');
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('pauseOverlay').classList.add('hidden');
            
            timerInterval = setInterval(() => {
                if (!paused) {
                    time--;
                    updateStats();
                    if (time <= 0) {
                        endGame();
                    }
                }
            }, 1000);
            
            moleInterval = setInterval(showMole, 600);
            showMole();
        }

        function togglePause() {
            if (!gameStarted) return;
            paused = !paused;
            const overlay = document.getElementById('pauseOverlay');
            if (paused) {
                hideMole();
                overlay.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
            }
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timerInterval);
            clearInterval(moleInterval);
            hideMole();
            
            document.getElementById('startBtn').disabled = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.remove('hidden');
        }

        updateStats();

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                togglePause();
                return;
            }
            
            if (!gameStarted) {
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    startGame();
                }
                return;
            }
        });
    </script>
</body>
</html>
