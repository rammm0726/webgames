<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f0f1a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            color: #e0e0e0;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .title {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats {
            display: flex;
            gap: 2rem;
        }
        .stat-box {
            background: rgba(16, 185, 129, 0.3);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            text-align: center;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #888;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .board {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 10px;
            position: relative;
        }
        #gameCanvas {
            display: block;
            background: #16162a;
            border-radius: 8px;
        }
        .btn {
            background: linear-gradient(135deg, #10b981, #06b6d4);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .instructions {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
        }
        .game-over, .pause-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }
        .game-over h2, .pause-overlay h2 { font-size: 2rem; }
        .game-over h2 { color: #10b981; }
        .pause-overlay h2 { color: #a855f7; }
        .hidden { display: none; }
        .start-screen {
            position: fixed;
            inset: 0;
            background: rgba(15, 15, 26, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2rem;
            z-index: 1000;
        }
        .start-screen h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .start-screen p { color: #888; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title">贪吃蛇 🐍</div>
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">分数</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">长度</div>
                <div class="stat-value" id="length">3</div>
            </div>
        </div>
        <div class="board">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>
        <button class="btn" onclick="startGame()">开始游戏</button>
        <div class="instructions">使用 ↑ ↓ ← → 方向键控制蛇的移动方向</div>
    </div>

    <div class="game-over hidden" id="gameOver">
        <h2>游戏结束</h2>
        <p>最终分数: <span id="finalScore">0</span></p>
        <button class="btn" onclick="document.getElementById('gameOver').classList.add('hidden'); startGame()">再来一局</button>
    </div>

    <div class="pause-overlay hidden" id="pauseOverlay">
        <h2>⏸️ 游戏暂停</h2>
        <p>按 ESC 继续游戏</p>
    </div>

    <div class="start-screen" id="startScreen">
        <h1>🐍 贪吃蛇</h1>
        <p>按 空格键 或 Enter 开始游戏</p>
        <button class="btn" onclick="startGame()">开始游戏</button>
        <p style="font-size: 0.9rem; color: #666;">使用 ↑ ↓ ← → 方向键控制</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const gridCount = 20;
        
        let snake = [];
        let direction = { x: 1, y: 0 };
        let food = {};
        let score = 0;
        let gameRunning = false;
        let gameLoop;
        let paused = false;
        let gameStarted = false;

        function initSnake() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * gridCount),
                y: Math.floor(Math.random() * gridCount)
            };
            
            while (snake.some(segment => segment.x === food.x && segment.y === food.y)) {
                food = {
                    x: Math.floor(Math.random() * gridCount),
                    y: Math.floor(Math.random() * gridCount)
                };
            }
        }

        function draw() {
            ctx.fillStyle = '#16162a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#10b981';
            snake.forEach(segment => {
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            });
            
            ctx.fillStyle = '#ec4899';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0, Math.PI * 2
            );
            ctx.fill();
        }

        function move() {
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            
            if (head.x < 0 || head.x >= gridCount || head.y < 0 || head.y >= gridCount) {
                endGame();
                return;
            }
            
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateStats();
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('length').textContent = snake.length;
        }

        function gameLoopFn() {
            if (!gameRunning || paused) {
                if (gameRunning && !paused) {
                    gameLoop = setTimeout(gameLoopFn, 100);
                }
                return;
            }
            
            move();
            draw();
            
            gameLoop = setTimeout(gameLoopFn, 100);
        }

        function startGame() {
            score = 0;
            gameRunning = true;
            paused = false;
            gameStarted = true;
            initSnake();
            spawnFood();
            updateStats();
            document.getElementById('gameOver').classList.add('hidden');
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('pauseOverlay').classList.add('hidden');
            draw();
            gameLoopFn();
        }

        function togglePause() {
            if (!gameStarted) return;
            paused = !paused;
            const overlay = document.getElementById('pauseOverlay');
            if (paused) {
                overlay.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
                gameLoopFn();
            }
        }

        function endGame() {
            gameRunning = false;
            clearTimeout(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.remove('hidden');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                togglePause();
                return;
            }
            
            if (!gameStarted) {
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    startGame();
                }
                return;
            }
            
            if (!gameRunning || paused) return;
            
            const keyMap = {
                ArrowUp: { x: 0, y: -1 },
                ArrowDown: { x: 0, y: 1 },
                ArrowLeft: { x: -1, y: 0 },
                ArrowRight: { x: 1, y: 0 }
            };
            
            const newDirection = keyMap[e.key];
            if (newDirection) {
                e.preventDefault();
                if (newDirection.x !== -direction.x && newDirection.y !== -direction.y) {
                    direction = newDirection;
                }
            }
        });

        draw();
    </script>
</body>
</html>
