<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>躲避障碍</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0f0f1a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh;
            color: #e0e0e0;
            overflow: hidden;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .title {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats {
            display: flex;
            gap: 2rem;
        }
        .stat-box {
            background: rgba(245, 158, 11, 0.3);
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            text-align: center;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #888;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .canvas-container {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 10px;
            overflow: hidden;
        }
        #gameCanvas {
            display: block;
            background: #16162a;
            border-radius: 8px;
        }
        .btn {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .instructions {
            text-align: center;
            color: #888;
            font-size: 0.85rem;
        }
        .game-over, .pause-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 1rem;
        }
        .game-over h2, .pause-overlay h2 { font-size: 2rem; }
        .game-over h2 { color: #f59e0b; }
        .pause-overlay h2 { color: #a855f7; }
        .hidden { display: none; }
        .start-screen {
            position: fixed;
            inset: 0;
            background: rgba(15, 15, 26, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2rem;
            z-index: 1000;
        }
        .start-screen h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .start-screen p { color: #888; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="title">躲避障碍 🏃</div>
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">分数</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">距离</div>
                <div class="stat-value" id="distance">0</div>
            </div>
        </div>
        <div class="canvas-container">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>
        <button class="btn" id="startBtn" onclick="startGame()">开始游戏</button>
        <div class="instructions">使用 ↑ ↓ ← → 方向键控制角色移动，躲避障碍物！</div>
    </div>

    <div class="game-over hidden" id="gameOver">
        <h2>游戏结束</h2>
        <p>最终分数: <span id="finalScore">0</span></p>
        <button class="btn" onclick="document.getElementById('gameOver').classList.add('hidden'); startGame()">再来一局</button>
    </div>

    <div class="pause-overlay hidden" id="pauseOverlay">
        <h2>⏸️ 游戏暂停</h2>
        <p>按 ESC 继续游戏</p>
    </div>

    <div class="start-screen" id="startScreen">
        <h1>🏃 躲避障碍</h1>
        <p>按 空格键 或 Enter 开始游戏</p>
        <button class="btn" onclick="startGame()">开始游戏</button>
        <p style="font-size: 0.9rem; color: #666;">使用 ↑ ↓ ← → 方向键控制角色</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let player = { x: 50, y: 200, width: 30, height: 40 };
        let obstacles = [];
        let score = 0;
        let distance = 0;
        let gameRunning = false;
        let gameLoop;
        let keys = {};
        let paused = false;
        let gameStarted = false;

        function init() {
            player = { x: 50, y: canvas.height / 2 - 20, width: 30, height: 40 };
            obstacles = [];
            score = 0;
            distance = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('distance').textContent = distance;
        }

        function drawPlayer() {
            ctx.fillStyle = '#22c55e';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            
            ctx.fillStyle = '#166534';
            ctx.fillRect(player.x + 5, player.y + 5, player.width - 10, 10);
        }

        function drawObstacles() {
            obstacles.forEach(obs => {
                ctx.fillStyle = '#ef4444';
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                
                ctx.fillStyle = '#991b1b';
                ctx.fillRect(obs.x + 5, obs.y + 5, obs.width - 10, obs.height - 10);
            });
        }

        function spawnObstacle() {
            const height = 30 + Math.random() * 50;
            const isTop = Math.random() > 0.5;
            obstacles.push({
                x: canvas.width,
                y: isTop ? 0 : canvas.height - height,
                width: 20 + Math.random() * 30,
                height: height
            });
        }

        function update() {
            if (!gameRunning || paused) return;
            
            if (keys['ArrowUp'] && player.y > 0) player.y -= 5;
            if (keys['ArrowDown'] && player.y < canvas.height - player.height) player.y += 5;
            if (keys['ArrowLeft'] && player.x > 0) player.x -= 5;
            if (keys['ArrowRight'] && player.x < canvas.width - player.width) player.x += 5;
            
            obstacles.forEach(obs => {
                obs.x -= 3;
            });
            
            obstacles = obstacles.filter(obs => obs.x + obs.width > 0);
            
            if (Math.random() < 0.02) {
                spawnObstacle();
            }
            
            distance++;
            score = Math.floor(distance / 10);
            document.getElementById('score').textContent = score;
            document.getElementById('distance').textContent = distance;
            
            checkCollision();
        }

        function checkCollision() {
            for (const obs of obstacles) {
                if (player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y) {
                    endGame();
                    return;
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#16162a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawPlayer();
            drawObstacles();
        }

        function gameLoopFn() {
            update();
            draw();
            gameLoop = requestAnimationFrame(gameLoopFn);
        }

        function startGame() {
            init();
            gameRunning = true;
            paused = false;
            gameStarted = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('pauseOverlay').classList.add('hidden');
            gameLoopFn();
        }

        function togglePause() {
            if (!gameStarted) return;
            paused = !paused;
            const overlay = document.getElementById('pauseOverlay');
            if (paused) {
                overlay.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
            }
        }

        function endGame() {
            gameRunning = false;
            cancelAnimationFrame(gameLoop);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.remove('hidden');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                togglePause();
                return;
            }
            
            if (!gameStarted) {
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    startGame();
                }
                return;
            }
            
            if (paused) return;
            
            keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        draw();
    </script>
</body>
</html>
